<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Tunnel Rush</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="UnityLoader.js"></script>
    <script src="UnityProgress.js"></script>
    <link rel="icon" href="img/tunnel.jpg">
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "build.json", {onProgress: UnityProgress,Module:{onRuntimeInitialized: function() {UnityProgress(gameInstance, "complete")}}});
    </script>
  </head>
  <style>
    html, body { margin:0; padding:0; background:#000; width:100%; height:100%; overflow:hidden; }
    .webgl-content { position:fixed; inset:0; }
    #gameContainer { width:100% !important; height:100% !important; }
    #gameContainer canvas { width:100% !important; height:100% !important; }
  </style>
  <body>
    <div class="webgl-content">
      <div id="gameContainer"></div>
    </div>
  </body>
</html>
