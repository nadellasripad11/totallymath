<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Rush — TotallyMath Original</title>
<style>
  :root {
    --bg: #08080f;
    --accent: #7c3aed;
    --accent-light: #a855f7;
    --good: #22c55e;
    --bad: #ef4444;
    --text: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; background: radial-gradient(circle at 50% 20%, #14142e 0%, #08080f 70%); }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    padding: 20px;
    background: rgba(8,8,15,0.82);
    backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }
  h1 {
    font-size: clamp(34px, 8vw, 60px);
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(120deg, var(--accent-light), #22d3ee);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub { font-size: 15px; color: #94a3b8; max-width: 340px; line-height: 1.55; }
  .keys { font-size: 13px; color: #94a3b8; margin-top: 4px; }
  kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; padding: 0 7px; margin: 0 2px;
    font-size: 12px; font-weight: 700; color: var(--text);
    background: linear-gradient(180deg, #2a2a4a, #1a1a35);
    border: 1px solid rgba(124,58,237,0.35); border-bottom-width: 3px; border-radius: 6px;
  }
  button {
    margin-top: 8px;
    padding: 12px 28px;
    font-size: 16px; font-weight: 700;
    color: #fff; background: var(--accent);
    border: none; border-radius: 10px; cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }
  button:hover { background: var(--accent-light); }
  button:active { transform: scale(0.96); }
  .final { font-size: 20px; font-weight: 700; color: var(--text); }
  .badge {
    font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent-light); border: 1px solid rgba(124,58,237,0.4);
    padding: 4px 12px; border-radius: 999px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div id="startScreen" class="overlay">
    <span class="badge">TotallyMath Original</span>
    <h1>Math Rush</h1>
    <p class="sub">Catch the falling answer that solves the equation up top. Right answer scores, wrong one costs a life. It gets faster — how long can you last?</p>
    <p class="keys"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> or <kbd>A</kbd> <kbd>D</kbd> to move the catcher</p>
    <button id="startBtn">Start</button>
  </div>

  <div id="overScreen" class="overlay hidden">
    <h1>Game Over</h1>
    <p class="final" id="finalScore">Score: 0</p>
    <p class="sub" id="bestLine">Best: 0</p>
    <button id="retryBtn">Play Again</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const startScreen = document.getElementById("startScreen");
  const overScreen = document.getElementById("overScreen");
  const startBtn = document.getElementById("startBtn");
  const retryBtn = document.getElementById("retryBtn");
  const finalScore = document.getElementById("finalScore");
  const bestLine = document.getElementById("bestLine");

  let W = 0, H = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  const BEST_KEY = "mathrush-best";
  let best = 0;
  try { best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0; } catch (e) {}

  const state = {
    running: false,
    score: 0,
    lives: 3,
    speed: 1.6,
    catcher: { x: 0, w: 120, h: 26 },
    equation: null,   // { a, b, op, answer }
    tiles: [],        // falling answer tiles
    spawnTimer: 0,
    keys: {},
    flash: 0,         // color flash on hit
    flashColor: "#22c55e",
  };

  function makeEquation() {
    const ops = ["+", "-", "×"];
    const op = ops[(Math.random() * ops.length) | 0];
    let a, b, answer;
    if (op === "+") { a = rand(2, 19); b = rand(2, 19); answer = a + b; }
    else if (op === "-") { a = rand(10, 25); b = rand(1, a - 1); answer = a - b; }
    else { a = rand(2, 9); b = rand(2, 9); answer = a * b; }
    return { a, b, op, answer };
  }

  function rand(lo, hi) { return (Math.random() * (hi - lo + 1) | 0) + lo; }

  function spawnWave() {
    // three tiles: one correct, two wrong-but-plausible
    const eq = state.equation;
    const correct = eq.answer;
    const options = new Set([correct]);
    while (options.size < 3) {
      let delta = rand(-6, 6);
      if (delta === 0) delta = 1;
      const wrong = correct + delta;
      if (wrong > 0) options.add(wrong);
    }
    const vals = shuffle([...options]);
    const lanes = 3;
    const laneW = W / lanes;
    state.tiles = vals.map((v, i) => ({
      value: v,
      correct: v === correct,
      x: laneW * i + laneW / 2,
      y: -40 - Math.random() * 120,
      r: 30,
      dead: false,
    }));
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function reset() {
    state.score = 0;
    state.lives = 3;
    state.speed = 1.6;
    state.catcher.x = W / 2;
    state.equation = makeEquation();
    spawnWave();
    state.flash = 0;
  }

  function start() {
    reset();
    state.running = true;
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
  }

  function gameOver() {
    state.running = false;
    if (state.score > best) {
      best = state.score;
      try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
    }
    finalScore.textContent = "Score: " + state.score;
    bestLine.textContent = "Best: " + best;
    overScreen.classList.remove("hidden");
  }

  startBtn.addEventListener("click", start);
  retryBtn.addEventListener("click", start);

  addEventListener("keydown", (e) => {
    state.keys[e.key.toLowerCase()] = true;
    if ([" ", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) e.preventDefault();
  });
  addEventListener("keyup", (e) => { state.keys[e.key.toLowerCase()] = false; });

  // touch / mouse drag control
  let pointerX = null;
  function setPointer(clientX) { pointerX = clientX; }
  canvas.addEventListener("mousemove", (e) => setPointer(e.clientX));
  canvas.addEventListener("touchmove", (e) => { if (e.touches[0]) setPointer(e.touches[0].clientX); }, { passive: true });

  function update(dt) {
    const c = state.catcher;
    const moveSpeed = 520 * dt;
    if (state.keys["arrowleft"] || state.keys["a"]) c.x -= moveSpeed;
    if (state.keys["arrowright"] || state.keys["d"]) c.x += moveSpeed;
    if (pointerX !== null) c.x += (pointerX - c.x) * Math.min(1, dt * 12);
    c.x = Math.max(c.w / 2, Math.min(W - c.w / 2, c.x));

    const catchY = H - 70;
    let waveResolved = false;

    for (const t of state.tiles) {
      if (t.dead) continue;
      t.y += state.speed * 120 * dt;

      // caught?
      if (t.y + t.r >= catchY && t.y - t.r <= catchY + c.h &&
          Math.abs(t.x - c.x) < c.w / 2 + t.r * 0.5) {
        t.dead = true;
        if (t.correct) {
          state.score += 10;
          state.speed += 0.08;
          state.flash = 1; state.flashColor = "#22c55e";
        } else {
          state.lives -= 1;
          state.flash = 1; state.flashColor = "#ef4444";
          if (state.lives <= 0) { gameOver(); return; }
        }
        waveResolved = true;
      }
      // missed the correct one off the bottom
      else if (t.y - t.r > H) {
        t.dead = true;
        if (t.correct) {
          state.lives -= 1;
          state.flash = 1; state.flashColor = "#ef4444";
          if (state.lives <= 0) { gameOver(); return; }
          waveResolved = true;
        }
      }
    }

    if (waveResolved || state.tiles.every((t) => t.dead)) {
      state.equation = makeEquation();
      spawnWave();
    }

    if (state.flash > 0) state.flash = Math.max(0, state.flash - dt * 3);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // nothing to render until a round is set up (e.g. on the start screen)
    if (!state.equation) return;

    // flash tint
    if (state.flash > 0) {
      ctx.fillStyle = state.flashColor;
      ctx.globalAlpha = state.flash * 0.18;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // equation header
    const eq = state.equation;
    ctx.textAlign = "center";
    ctx.fillStyle = "#94a3b8";
    ctx.font = "600 14px Inter, sans-serif";
    ctx.fillText("SOLVE", W / 2, 44);
    ctx.fillStyle = "#fff";
    ctx.font = "900 44px Inter, sans-serif";
    ctx.fillText(`${eq.a} ${eq.op} ${eq.b} = ?`, W / 2, 92);

    // score + lives
    ctx.textAlign = "left";
    ctx.fillStyle = "#a855f7";
    ctx.font = "800 20px Inter, sans-serif";
    ctx.fillText("Score " + state.score, 20, 40);
    ctx.textAlign = "right";
    ctx.fillStyle = "#ef4444";
    ctx.fillText("♥".repeat(state.lives), W - 20, 40);

    // tiles
    for (const t of state.tiles) {
      if (t.dead) continue;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      ctx.fillStyle = "#1a1a35";
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#7c3aed";
      ctx.stroke();
      ctx.fillStyle = "#fff";
      ctx.font = "800 22px Inter, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(t.value), t.x, t.y + 1);
      ctx.textBaseline = "alphabetic";
    }

    // catcher
    const c = state.catcher;
    const cy = H - 70;
    const grad = ctx.createLinearGradient(0, cy, 0, cy + c.h);
    grad.addColorStop(0, "#a855f7");
    grad.addColorStop(1, "#7c3aed");
    ctx.fillStyle = grad;
    roundRect(ctx, c.x - c.w / 2, cy, c.w, c.h, 8);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "700 12px Inter, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("CATCH", c.x, cy + 17);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (state.running) update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
