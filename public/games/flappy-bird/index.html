<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Original Flappy Bird -JavaScript</title>
    <link href="https://fonts.googleapis.com/css?family=Teko:700" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #08080f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            height: 100vh;
            width: auto;
            max-width: 100vw;
        }
    </style>
</head>
<body>
    <canvas id="bird" width="320" height="480"></canvas>

    <script src="game.js"></script>
</body>
</html>
